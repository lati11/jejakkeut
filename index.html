<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="favicon.ico">
    <title>제작끝</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head> 
<body class="bg-gray-100 dark:bg-gray-900 transition-colors duration-300 p-8">

    <div class="relative max-w-3xl mx-auto bg-white dark:bg-gray-800 p-6 rounded-lg shadow-md min-w-[700px] transition-colors duration-300">
        
        <div class="absolute top-6 right-6 flex flex-col items-end gap-3 z-[60]">
            <div class="flex items-center gap-3">
                <button 
                  id="data-book-btn" 
                  type="button"
                  class="relative w-7 h-7 bg-gray-200 dark:bg-gray-700 rounded-full shadow-inner transition-colors duration-300 focus:outline-none flex items-center justify-center text-gray-600 dark:text-gray-300 hover:bg-gray-300 dark:hover:bg-gray-600"
                  aria-label="데이터 관리"
                >
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                  </svg>
                </button>
                <button 
                  id="theme-toggle" 
                  type="button"
                  class="relative w-10 h-6 bg-gray-200 rounded-full shadow-inner transition-colors duration-300 focus:outline-none dark:bg-gray-700 overflow-hidden"
                  aria-label="다크모드 토글"
                >
                  <div 
                    id="toggle-circle"
                    class="absolute top-1 left-1 w-4 h-4 bg-white rounded-full shadow-md transform transition-transform duration-300 ease-[cubic-bezier(0.4,0.0,0.2,1)] flex items-center justify-center"
                  >
                    <svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-amber-500 transition-opacity duration-300 opacity-100" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                    </svg>
                    <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" class="w-3 h-3 text-indigo-500 transition-opacity duration-300 opacity-0 absolute" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                    </svg>
                  </div>
                </button>
            </div>
            
            <button 
              id="altar-calc-btn" 
              type="button"
              class="flex items-center gap-1.5 px-3 py-1.5 bg-gray-200 dark:bg-gray-700 rounded-md shadow-inner transition-colors duration-300 focus:outline-none text-sm font-bold text-gray-700 dark:text-gray-200 hover:bg-gray-300 dark:hover:bg-gray-600"
            >
              <span>🏛️</span>
              <span>제단 계산</span>
            </button>
        </div>

        <h1 class="flex items-baseline text-3xl font-bold text-left mb-6 text-gray-800 dark:text-gray-100 transition-colors">
            <span>🔨 제작끝</span>
            <span class="ml-2 text-sm font-normal text-gray-400 dark:text-gray-500">v. 2.0.0</span>
        </h1>

        <div class="relative z-50">
            <label for="item-name" class="inline-block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">아이템명</label>
            
            <img id="main-item-icon" src="" alt="" 
                 class="absolute left-2 top-10 mt-0.5 -translate-y-1 w-5 h-5 hidden" 
                 onerror="this.style.display='none'">

            <input type="text" id="item-name" 
                   class="pl-9 mt-1 block w-full md:w-56 py-1 px-3 border border-gray-300 dark:border-gray-600 rounded-md shadow-sm text-lg font-semibold bg-white dark:bg-gray-700 dark:text-white transition-colors"
                   autocomplete="off">
            
            <div id="preset-dropdown" class="absolute z-50 w-full md:w-56 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 dark:text-gray-200 rounded-md shadow-lg mt-1 hidden max-h-60 overflow-y-auto">
            </div>
        </div>

        <div class="space-y-6 mt-6 relative z-10">

            <div>
                <h3 class="text-lg font-semibold text-gray-800 dark:text-gray-100 mb-3 pb-2 border-b dark:border-gray-700">스태미나</h3>
                <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                    <div>
                        <div class="flex items-center gap-2">
                        <label for="stamina-amount" class="text-sm font-medium text-gray-700 dark:text-gray-300 whitespace-nowrap">소모 스태미나</label>
                        <input type="text" inputmode="numeric" id="stamina-amount"
                            class="w-16 py-1 px-2 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 dark:text-white rounded-md text-right transition-colors">
                            <img src="stamina.png" alt="스태미나" class="w-5 h-5">
                        </div> 
                    </div>
                    <div class="flex items-center gap-2">
                        <input type="text" inputmode="numeric" id="stamina-unit-count" value="1"
                               class="w-16 py-1 px-2 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 dark:text-white rounded-md text-right transition-colors">
                        <span class="text-sm text-gray-700 dark:text-gray-300 whitespace-nowrap">스태미나 당</span>
                        <input type="text" inputmode="numeric" id="stamina-unit-price"
                               class="flex-grow md:flex-grow-0 md:w-24 py-1 px-2 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 dark:text-white rounded-md text-right transition-colors">
                        <span class="text-sm text-gray-700 dark:text-gray-300 whitespace-nowrap">코인</span>
                    </div>
                </div>
            </div>

            <div>
                <div class="flex items-center justify-between mb-3 pb-2 border-b dark:border-gray-700">
                    <div class="flex items-baseline">
                        <h3 class="text-lg font-semibold text-gray-800 dark:text-gray-100">재료</h3>
                        <span class="ml-2 text-sm text-gray-500 dark:text-gray-400">제작에 들어가는 재료 기입</span>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="auto-save-price" class="sr-only peer" checked>
                        <div class="w-9 h-5 bg-gray-200 peer-focus:outline-none rounded-full peer dark:bg-gray-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all dark:border-gray-600 peer-checked:bg-blue-400"></div>
                        <span class="ml-2 text-sm font-medium text-gray-700 dark:text-gray-300">시세 저장</span>
                    </label>
                </div>
                <div id="materials-list" class="space-y-2">
                </div>
                <button id="add-material" 
                        class="mt-3 w-full bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-300 font-medium py-2 px-4 rounded-md hover:bg-gray-300 dark:hover:bg-gray-600 transition">
                    +
                </button>
            </div>

            <div>
                <div class="flex items-center justify-between mb-3 pb-2 border-b dark:border-gray-700">
                    <div class="flex items-baseline">
                        <h3 class="text-lg font-semibold text-gray-800 dark:text-gray-100">제작 결과</h3>
                        <span class="ml-2 text-sm text-gray-500 dark:text-gray-400">제작 확률 및 개수 기입</span>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="auto-save-outcome" class="sr-only peer" checked>
                        <div class="w-9 h-5 bg-gray-200 peer-focus:outline-none rounded-full peer dark:bg-gray-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all dark:border-gray-600 peer-checked:bg-blue-400"></div>
                        <span class="ml-2 text-sm font-medium text-gray-700 dark:text-gray-300">제작 정보 저장</span>
                    </label>
                </div>
                <div id="outcomes-list" class="space-y-2">
                </div>
                <button id="add-outcome" 
                        class="mt-3 w-full bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-300 font-medium py-2 px-4 rounded-md hover:bg-gray-300 dark:hover:bg-gray-600 transition">
                    +
                </button>
            </div>

            <div id="result-area" class="flex items-center justify-center gap-2 mt-6 p-4 bg-gray-50 dark:bg-gray-700/50 rounded-lg transition-colors border dark:border-gray-700">
                <img src="coin.png" alt="코인" class="w-6 h-6">
                <span id="result-cost" class="text-xl font-medium text-gray-900 dark:text-white">0</span>
                <span class="text-lg text-gray-900 dark:text-gray-200">코인</span>
                <span class="text-sm text-gray-500 dark:text-gray-400">(개당 제작비)</span>
                <button id="save-result-btn" class="absolute right-4 px-3 py-1.5 bg-blue-100 text-black dark:bg-blue-900/50 dark:text-white text-xs font-semibold rounded-md hover:bg-blue-200 dark:hover:bg-blue-800 transition-colors">
                    시세에 저장
                </button>
            </div>

        </div>
    </div>

    <div id="data-modal" class="fixed inset-0 bg-black/50 z-[100] hidden flex items-center justify-center transition-opacity opacity-0 duration-300">
        <div id="data-modal-content" class="bg-white dark:bg-gray-800 rounded-lg shadow-xl w-full max-w-2xl max-h-[85vh] flex flex-col mx-4 transform scale-95 transition-transform duration-300">
            <div class="p-4 border-b dark:border-gray-700 flex justify-between items-center">
                <h2 class="text-xl font-bold text-gray-800 dark:text-white flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>
                    데이터 관리
                </h2>
                <button id="close-modal-btn" class="text-gray-400 hover:text-red-500 transition-colors focus:outline-none">
                    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="flex border-b dark:border-gray-700">
                <button id="tab-price-btn" class="flex-1 py-3 text-center font-bold text-blue-600 border-b-2 border-blue-600 dark:text-blue-400 dark:border-blue-400 transition-colors">시세</button>
                <button id="tab-outcome-btn" class="flex-1 py-3 text-center font-medium text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 border-b-2 border-transparent transition-colors">제작</button>
            </div>
            <div class="p-4 overflow-y-auto flex-grow bg-gray-50 dark:bg-gray-800" id="modal-content-area">
            </div>
            <div class="p-3 border-t dark:border-gray-700 text-center text-xs text-gray-500 dark:text-gray-400 bg-gray-100 dark:bg-gray-800/50 rounded-b-lg">
                입력한 값은 자동 저장됩니다.
            </div>
        </div>
    </div>
    <div id="altar-modal" class="fixed inset-0 bg-black/50 z-[100] hidden flex items-center justify-center transition-opacity opacity-0 duration-300">
        <div id="altar-modal-content" class="bg-white dark:bg-gray-800 rounded-lg shadow-xl w-full max-w-3xl max-h-[120vh] flex flex-col mx-4 transform scale-95 transition-transform duration-300">
            <div class="p-4 border-b dark:border-gray-700 flex justify-between items-center">
                <h2 class="text-xl font-bold text-gray-800 dark:text-white flex items-center gap-2">
                    🏛️ 제단 계산기
                </h2>
                <button id="close-altar-modal-btn" class="text-gray-400 hover:text-red-500 transition-colors focus:outline-none">
                    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <div class="p-4 bg-gray-100 dark:bg-gray-700 border-b dark:border-gray-600 flex flex-wrap gap-4 items-center justify-between">
                <div class="flex items-center gap-2">
                    <label class="font-semibold text-gray-700 dark:text-gray-200">목표 점수</label>
                    <input type="text" inputmode="numeric" id="altar-target-score" value="0" class="w-24 py-1 px-2 border dark:border-gray-500 rounded bg-white dark:bg-gray-800 dark:text-white text-right font-semibold focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div class="flex items-center gap-2">
                    <label class="font-semibold text-gray-700 dark:text-gray-200">제단 배수</label>
                    <input type="number" step="0.1" id="altar-multiplier" value="1.0" class="w-20 py-1 px-2 border dark:border-gray-500 rounded bg-white dark:bg-gray-800 dark:text-white text-right font-semibold focus:ring-2 focus:ring-blue-500 outline-none">
                    <span class="text-sm text-gray-500 dark:text-gray-400">배</span>
                </div>
                <button id="run-altar-calc-btn" class="px-6 py-2 bg-blue-400 hover:bg-blue-500 text-white font-bold rounded-lg shadow transition-colors">
                    계산하기
                </button>
            </div>

            <div class="p-4 overflow-y-auto flex-grow bg-gray-50 dark:bg-gray-800" id="altar-items-area">
                </div>

                <div id="altar-result-area" class="p-4 bg-white dark:bg-gray-800 border-t dark:border-gray-700 hidden">
                    <div class="flex justify-between items-center mb-3">
                        <h3 class="text-lg font-bold text-blue-600 dark:text-blue-400">계산 결과</h3>
                        <button id="copy-altar-result-btn" class="px-3 py-1.5 bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 text-xs font-bold rounded-md hover:bg-blue-100 hover:text-blue-600 transition-colors flex items-center gap-1">
                            📋 결과 복사하기
                        </button>
                    </div>
    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                        <div class="p-3 bg-gray-100 dark:bg-gray-700 rounded-lg">
                            <div class="text-sm text-gray-500 dark:text-gray-400">소모 비용</div>
                            <div class="text-xl font-bold text-gray-900 dark:text-white" id="altar-res-cost">0 코인</div>
                        </div>
                        <div class="p-3 bg-gray-100 dark:bg-gray-700 rounded-lg flex justify-between items-center">
                            <div>
                                <div class="text-sm text-gray-500 dark:text-gray-400">달성 점수</div>
                                <div class="text-xl font-bold text-gray-900 dark:text-white" id="altar-res-score">0 점</div>
                            </div>
                            <div class="text-right">
                                <div class="text-sm text-gray-500 dark:text-gray-400">제단 제한</div>
                                <div class="text-lg font-bold text-gray-900 dark:text-white" id="altar-res-count">0 / 64</div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="p-3 bg-blue-50 dark:bg-blue-900/30 rounded-lg border dark:border-blue-800/50">
                        <div id="altar-res-list" class="grid grid-cols-1 sm:grid-cols-2 gap-x-6 gap-y-2 max-h-80 overflow-y-auto pr-2 custom-scrollbar">
                            </div>
                    </div>
                </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
